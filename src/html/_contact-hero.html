<section class="contact-hero">
    <div class="contact-hero__container container">

        <div class="contact-hero__body">

            <!-- Left -->
            <div class="contact-hero__content">

                <h1 class="contact-hero__title">
                    Contact Me
                </h1>

                <p class="contact-hero__text">
                    Feel free to get in touch if you would like to discuss frontend development,
                    collaboration opportunities or project ideas.
                </p>

                <div class="contact-hero__image">

                    <picture>
                        <source srcset="./img/contact/contact-illustration.webp" type="image/webp">
                        <img src="./img/contact/contact-illustration.jpg" loading="lazy" alt="Contact illustration">
                    </picture>
                </div>

            </div>

            <!-- Right -->
            <div class="contact-hero__form">

                <!-- form -->
                <div class="form-wrapper">

                    <h2 class="form-title">
                        Get Started
                    </h2>

                    <form class="form" action="/" method="POST" novalidate>

                        <div class="form__field">
                            <label for="firstname1" class="visually-hidden">
                                First Name
                            </label>

                            <input class="form__input" id="firstname1" type="text" name="firstname"
                                placeholder="First Name">
                        </div>

                        <div class="form__field">
                            <label for="lastname1" class="visually-hidden">
                                Last Name
                            </label>

                            <input class="form__input" id="lastname1" type="text" name="lastname"
                                placeholder="Last Name" autocomplete="family-name">
                        </div>

                        <div class="form__field">
                            <label for="email1" class="visually-hidden">
                                Email
                            </label>

                            <input class="form__input" id="email1" type="email" name="email" placeholder="Email"
                                autocomplete="email">
                        </div>

                        <div class="form__field">
                            <label for="phone1" class="visually-hidden">
                                Phone
                            </label>

                            <input class="form__input" id="phone1" type="tel" name="phone" maxlength="15"
                                pattern="^\+?[0-9]{8,15}$" placeholder="Phone" autocomplete="tel">
                        </div>

                        <button class="form__btn btn" type="submit">
                            Send Message
                        </button>

                        <p class="form__disclaimer">
                            By submitting this form, you agree to the demo terms and privacy
                            policy. This project was created for portfolio purposes only.
                        </p>

                    </form>

                </div>

            </div>

        </div>

    </div>
</section>
