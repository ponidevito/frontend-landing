<section class="live">
  <div class="live__container">

    <h2 class="live__title title-h2">
      Live User Activity
    </h2>

    <div class="live__table-wrapper">
      <table class="table" aria-label="Live user activity data">
        <thead class="table__head">
          <tr class="table__row table__row--head">
            <th class="table__cell" scope="col">User</th>
            <th class="table__cell" scope="col">Balance</th>
            <th class="table__cell" scope="col">Change (24h)</th>
            <th class="table__cell" scope="col">Performance</th>
            <th class="table__cell" scope="col">Time</th>
          </tr>
        </thead>

        <tbody class="table__body" id="table-body">
        </tbody>
      </table>
    </div>

  </div>
</section>
